<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裝潢工程合約產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --ink-light: #4a4540;
    --parchment: #f5f0e8;
    --cream: #faf7f2;
    --warm: #c8a96e;
    --warm-light: #e8d9b8;
    --warm-pale: #f0e8d4;
    --accent: #8b6914;
    --border: #d4c4a0;
    --section-bg: #fffdf8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* Layout */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 420px;
    min-width: 420px;
    background: var(--ink);
    color: var(--parchment);
    padding: 40px 36px;
    overflow-y: auto;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .main {
    flex: 1;
    padding: 48px 52px;
    overflow-y: auto;
  }

  /* Sidebar header */
  .sidebar-header {
    border-bottom: 1px solid rgba(200,169,110,0.3);
    padding-bottom: 28px;
    margin-bottom: 32px;
  }

  .sidebar-header .label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 10px;
  }

  .sidebar-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1.3;
    color: #fff;
    margin-bottom: 8px;
  }

  .sidebar-header p {
    font-size: 12px;
    color: rgba(245,240,232,0.5);
    line-height: 1.6;
  }

  /* Form sections */
  .form-section {
    margin-bottom: 28px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,169,110,0.2);
  }

  .field { margin-bottom: 12px; }

  .field label {
    display: block;
    font-size: 11px;
    color: rgba(245,240,232,0.6);
    margin-bottom: 5px;
    letter-spacing: 0.05em;
  }

  .field input,
  .field textarea,
  .field select {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,169,110,0.2);
    border-radius: 4px;
    padding: 9px 12px;
    color: var(--parchment);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    border-color: var(--warm);
    background: rgba(255,255,255,0.1);
  }
  .field textarea { resize: vertical; min-height: 72px; }
  .field select option { background: #2a2520; }

  /* Row layout */
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Items table */
  .items-list { margin-bottom: 10px; }
  .item-row {
    display: grid;
    grid-template-columns: 1fr 56px 70px 20px;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .item-row input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,169,110,0.2);
    border-radius: 3px;
    padding: 7px 9px;
    color: var(--parchment);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 300;
    outline: none;
    width: 100%;
  }
  .item-row input:focus { border-color: var(--warm); }
  .remove-item {
    background: none;
    border: none;
    color: rgba(200,169,110,0.4);
    cursor: pointer;
    font-size: 14px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .remove-item:hover { color: #e06060; }

  .add-item-btn {
    background: none;
    border: 1px dashed rgba(200,169,110,0.3);
    border-radius: 3px;
    color: rgba(200,169,110,0.6);
    font-size: 11px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    padding: 7px 14px;
    width: 100%;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .add-item-btn:hover {
    border-color: var(--warm);
    color: var(--warm);
    background: rgba(200,169,110,0.05);
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    background: var(--warm);
    color: var(--ink);
    border: none;
    border-radius: 5px;
    padding: 14px 20px;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }
  .generate-btn:hover {
    background: #d4b47a;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(200,169,110,0.3);
  }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(26,23,20,0.3);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Main area */
  .main-header {
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .main-header .eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 6px;
  }
  .main-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--ink);
    font-weight: 400;
  }

  /* Contract output */
  #contract-output {
    min-height: 200px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--ink-light);
  }
  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .empty-state p {
    font-size: 13px;
    line-height: 1.8;
    opacity: 0.6;
  }

  /* Contract document */
  .contract-doc {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 60px 64px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    line-height: 2;
    color: var(--ink);
    position: relative;
  }

  .contract-doc .doc-header {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 2px solid var(--ink);
  }
  .contract-doc .doc-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.25em;
    margin-bottom: 8px;
  }
  .contract-doc .doc-header .doc-no {
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 0.1em;
  }

  .contract-doc .contract-body {
    white-space: pre-wrap;
    font-size: 13.5px;
    line-height: 2.1;
  }

  .contract-doc .signature-area {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }
  .sig-block p {
    font-size: 12px;
    border-top: 1px solid var(--ink);
    padding-top: 6px;
    margin-top: 40px;
    letter-spacing: 0.05em;
  }

  /* Action bar */
  .action-bar {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }
  .action-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 18px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    color: var(--ink-light);
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .action-btn:hover {
    border-color: var(--warm);
    color: var(--accent);
    background: var(--warm-pale);
  }
  .action-btn.primary {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .action-btn.primary:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* Streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--warm);
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--warm-light); border-radius: 10px; }

  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; height: auto; position: static; }
    .main { padding: 32px 24px; }
    .contract-doc { padding: 36px 28px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar Form -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="label">Contract Generator</div>
      <h1>裝潢工程<br>合約產生器</h1>
      <p>填寫基本資訊，AI 將自動生成完整合法的工程合約</p>
    </div>

    <!-- 甲方 -->
    <div class="form-section">
      <div class="section-title">甲方（業主）</div>
      <div class="field"><label>姓名 / 公司名稱</label><input type="text" id="owner-name" placeholder="林○○ / ○○有限公司"></div>
      <div class="field-row">
        <div class="field"><label>身分證 / 統一編號</label><input type="text" id="owner-id" placeholder="A123456789"></div>
        <div class="field"><label>聯絡電話</label><input type="text" id="owner-phone" placeholder="0912-345-678"></div>
      </div>
      <div class="field"><label>地址</label><input type="text" id="owner-addr" placeholder="台北市○○區○○路○號"></div>
    </div>

    <!-- 乙方 -->
    <div class="form-section">
      <div class="section-title">乙方（承包商）</div>
      <div class="field"><label>公司 / 工作室名稱</label><input type="text" id="contractor-name" placeholder="○○室內裝修有限公司"></div>
      <div class="field-row">
        <div class="field"><label>統一編號</label><input type="text" id="contractor-id" placeholder="12345678"></div>
        <div class="field"><label>負責人</label><input type="text" id="contractor-rep" placeholder="王○○"></div>
      </div>
      <div class="field"><label>公司地址</label><input type="text" id="contractor-addr" placeholder="台北市○○區○○路○號"></div>
      <div class="field-row">
        <div class="field"><label>電話</label><input type="text" id="contractor-phone" placeholder="02-1234-5678"></div>
        <div class="field"><label>室內裝修業登記證號</label><input type="text" id="contractor-license" placeholder="北市裝修字第○○號"></div>
      </div>
    </div>

    <!-- 工程資訊 -->
    <div class="form-section">
      <div class="section-title">工程資訊</div>
      <div class="field"><label>工程名稱</label><input type="text" id="project-name" placeholder="民生社區住宅室內裝修工程"></div>
      <div class="field"><label>施工地址</label><input type="text" id="project-addr" placeholder="台北市松山區民生東路○段○號○樓"></div>
      <div class="field-row">
        <div class="field"><label>開工日期</label><input type="date" id="start-date"></div>
        <div class="field"><label>完工日期</label><input type="date" id="end-date"></div>
      </div>
      <div class="field">
        <label>付款方式</label>
        <select id="payment-type">
          <option value="三期">三期付款（簽約/開工/完工）</option>
          <option value="四期">四期付款（簽約/開工/中期/完工）</option>
          <option value="兩期">兩期付款（開工/完工）</option>
          <option value="自訂">自訂方式</option>
        </select>
      </div>
    </div>

    <!-- 工程項目 -->
    <div class="form-section">
      <div class="section-title">工程項目與報價</div>
      <div class="item-row" style="margin-bottom:6px;opacity:0.4;font-size:10px;letter-spacing:0.05em;">
        <span>項目名稱</span><span>數量</span><span>金額(元)</span><span></span>
      </div>
      <div class="items-list" id="items-list">
        <div class="item-row">
          <input type="text" placeholder="拆除工程" class="item-name">
          <input type="number" placeholder="1" class="item-qty">
          <input type="number" placeholder="50000" class="item-price">
          <button class="remove-item" onclick="removeItem(this)">×</button>
        </div>
      </div>
      <button class="add-item-btn" onclick="addItem()">＋ 新增工程項目</button>
    </div>

    <!-- 特殊條款 -->
    <div class="form-section">
      <div class="section-title">特殊需求 / 備註</div>
      <div class="field">
        <textarea id="special-notes" placeholder="例如：需包含保固條款、環保建材要求、特殊施工規範、防水保固年限…等"></textarea>
      </div>
    </div>

    <button class="generate-btn" onclick="generateContract()" id="gen-btn">
      產生合約書
    </button>
  </aside>

  <!-- Main Output -->
  <main class="main">
    <div class="main-header">
      <div class="eyebrow">Output Preview</div>
      <h2>合約預覽</h2>
    </div>

    <div id="contract-output">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>填寫左側表單資料後<br>點擊「產生合約書」<br>AI 將依據資訊生成完整合約文件</p>
      </div>
    </div>
  </main>
</div>

<script>
function addItem() {
  const list = document.getElementById('items-list');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <input type="text" placeholder="工程項目" class="item-name">
    <input type="number" placeholder="1" class="item-qty">
    <input type="number" placeholder="0" class="item-price">
    <button class="remove-item" onclick="removeItem(this)">×</button>
  `;
  list.appendChild(row);
}

function removeItem(btn) {
  const rows = document.querySelectorAll('.item-row');
  if (rows.length > 1) btn.closest('.item-row').remove();
}

function getItems() {
  const rows = document.querySelectorAll('.item-row');
  let items = [];
  let total = 0;
  rows.forEach(row => {
    const name = row.querySelector('.item-name')?.value?.trim();
    const qty = row.querySelector('.item-qty')?.value || 1;
    const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
    if (name) {
      items.push({ name, qty: parseInt(qty), price });
      total += price;
    }
  });
  return { items, total };
}

function formatCurrency(n) {
  return n.toLocaleString('zh-TW');
}

async function generateContract() {
  const btn = document.getElementById('gen-btn');
  const output = document.getElementById('contract-output');

  // Collect data
  const data = {
    ownerName: document.getElementById('owner-name').value || '甲方姓名',
    ownerId: document.getElementById('owner-id').value || '___',
    ownerPhone: document.getElementById('owner-phone').value || '___',
    ownerAddr: document.getElementById('owner-addr').value || '___',
    contractorName: document.getElementById('contractor-name').value || '乙方公司',
    contractorId: document.getElementById('contractor-id').value || '___',
    contractorRep: document.getElementById('contractor-rep').value || '___',
    contractorAddr: document.getElementById('contractor-addr').value || '___',
    contractorPhone: document.getElementById('contractor-phone').value || '___',
    contractorLicense: document.getElementById('contractor-license').value || '___',
    projectName: document.getElementById('project-name').value || '室內裝修工程',
    projectAddr: document.getElementById('project-addr').value || '___',
    startDate: document.getElementById('start-date').value || '___',
    endDate: document.getElementById('end-date').value || '___',
    paymentType: document.getElementById('payment-type').value,
    specialNotes: document.getElementById('special-notes').value || '無',
  };
  const { items, total } = getItems();

  const itemsText = items.length
    ? items.map((i, idx) => `  ${idx+1}. ${i.name}（${i.qty}式）：新台幣 ${formatCurrency(i.price)} 元`).join('\n')
    : '  （請填寫工程項目）';

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> AI 生成中…';

  // Show container
  output.innerHTML = `
    <div class="contract-doc">
      <div class="doc-header">
        <h1>裝潢工程承攬合約書</h1>
        <div class="doc-no">Contract No. ___________</div>
      </div>
      <div class="contract-body" id="streaming-body"><span class="cursor"></span></div>
    </div>
  `;

  const prompt = `請依據以下資訊，產生一份完整、專業、合法的台灣「裝潢工程承攬合約書」正文內容（不含標題，從當事人條款開始）。

【甲方（業主）】
姓名：${data.ownerName}
身分證/統編：${data.ownerId}
電話：${data.ownerPhone}
地址：${data.ownerAddr}

【乙方（承包商）】
公司名稱：${data.contractorName}
統一編號：${data.contractorId}
負責人：${data.contractorRep}
公司地址：${data.contractorAddr}
電話：${data.contractorPhone}
室內裝修業登記證號：${data.contractorLicense}

【工程資訊】
工程名稱：${data.projectName}
施工地址：${data.projectAddr}
預計開工：${data.startDate}
預計完工：${data.endDate}
付款方式：${data.paymentType}

【工程項目】
${itemsText}
合計總價：新台幣 ${formatCurrency(total)} 元整

【特殊需求/備註】
${data.specialNotes}

請依序包含以下條款（用正式繁體中文，條款格式清晰）：
第一條 工程範圍
第二條 工程期限
第三條 工程總價及付款方式（依據付款方式「${data.paymentType}」說明各期付款金額與時機）
第四條 材料與施工標準
第五條 工程變更
第六條 工程驗收
第七條 保固責任（至少1年一般保固，防水工程2年）
第八條 甲方權利與義務
第九條 乙方權利與義務
第十條 違約責任（含工期延誤罰則，每逾期一日按總工程款千分之一計罰）
第十一條 不可抗力
第十二條 爭議處理（以台灣台北地方法院為第一審管轄法院）
第十三條 合約效力

結尾加上「本合約書一式兩份，雙方各執一份為憑。」及簽約日期欄位。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        stream: true,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    const bodyEl = document.getElementById('streaming-body');
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
              fullText += parsed.delta.text;
              bodyEl.innerHTML = escapeHtml(fullText) + '<span class="cursor"></span>';
              bodyEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
          } catch (e) {}
        }
      }
    }

    // Remove cursor, add signature block
    bodyEl.innerHTML = escapeHtml(fullText);
    const doc = bodyEl.closest('.contract-doc');
    doc.innerHTML += `
      <div class="signature-area">
        <div class="sig-block">
          <p>甲方（業主）簽章</p>
          <p style="margin-top:8px;font-size:11px;color:#666;">姓名：${escapeHtml(data.ownerName)}</p>
        </div>
        <div class="sig-block">
          <p>乙方（承包商）簽章</p>
          <p style="margin-top:8px;font-size:11px;color:#666;">公司：${escapeHtml(data.contractorName)}</p>
        </div>
      </div>
    `;

    // Action buttons
    output.innerHTML += `
      <div class="action-bar">
        <button class="action-btn" onclick="copyContract()">複製全文</button>
        <button class="action-btn primary" onclick="printContract()">列印 / 匯出 PDF</button>
      </div>
    `;

  } catch (err) {
    output.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>生成失敗，請稍後重試。<br><small>${err.message}</small></p></div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '重新產生合約書';
  }
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function copyContract() {
  const text = document.querySelector('.contract-body')?.innerText || '';
  navigator.clipboard.writeText(text).then(() => alert('合約內容已複製至剪貼簿'));
}

function printContract() {
  const doc = document.querySelector('.contract-doc');
  if (!doc) return;
  const win = window.open('', '_blank');
  win.document.write(`
    <html><head>
    <meta charset="UTF-8">
    <title>裝潢工程合約書</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Noto Serif TC', serif; font-size: 13px; line-height: 2; padding: 40px 60px; color: #1a1714; }
      h1 { text-align: center; font-size: 20px; letter-spacing: 0.2em; margin-bottom: 8px; }
      .doc-no { text-align: center; font-size: 11px; color: #666; margin-bottom: 32px; border-bottom: 2px solid #1a1714; padding-bottom: 16px; }
      .sig { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 60px; border-top: 1px solid #ccc; padding-top: 24px; }
      .sig-block p { border-top: 1px solid #1a1714; padding-top: 4px; margin-top: 60px; font-size: 11px; }
      @media print { body { padding: 20px 40px; } }
    </style></head><body>
    <h1>裝潢工程承攬合約書</h1>
    <div class="doc-no">Contract No. ___________</div>
    ${document.querySelector('.contract-body').innerHTML}
    <div class="sig">
      <div class="sig-block"><p>甲方（業主）簽章</p></div>
      <div class="sig-block"><p>乙方（承包商）簽章</p></div>
    </div>
    </body></html>
  `);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 600);
}
</script>
</body>
</html>
