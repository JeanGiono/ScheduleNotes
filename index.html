<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程管理工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">行程管理工具</h1>
                <div class="header-controls">
                    <button class="btn btn--secondary theme-toggle" id="themeToggle" aria-label="切換主題">
                        🌙
                    </button>
                    <button class="btn btn--primary" id="addEventBtn">新增事件</button>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav-bar">
            <div class="nav-controls">
                <button class="btn btn--outline nav-btn" id="prevBtn">&lt;</button>
                <button class="btn btn--outline nav-btn" id="todayBtn">今天</button>
                <button class="btn btn--outline nav-btn" id="nextBtn">&gt;</button>
            </div>
            <h2 class="current-date" id="currentDate"></h2>
            <div class="view-controls">
                <button class="btn btn--secondary view-btn active" data-view="month">月</button>
                <button class="btn btn--secondary view-btn" data-view="week">週</button>
                <button class="btn btn--secondary view-btn" data-view="day">日</button>
                <button class="btn btn--secondary view-btn" data-view="year">年</button>
            </div>
        </nav>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>搜索</h3>
                <input type="text" class="form-control" id="searchInput" placeholder="搜索事件...">
            </div>
            
            <div class="sidebar-section">
                <h3>篩選</h3>
                <select class="form-control" id="filterSelect">
                    <option value="">所有事件</option>
                    <option value="工作">工作</option>
                    <option value="個人">個人</option>
                    <option value="假期">假期</option>
                </select>
            </div>

            <div class="sidebar-section">
                <h3>顏色標籤</h3>
                <div class="color-filters" id="colorFilters">
                    <div class="color-filter" data-color="blue">
                        <div class="color-dot color-blue"></div>
                        <span>藍色</span>
                    </div>
                    <div class="color-filter" data-color="green">
                        <div class="color-dot color-green"></div>
                        <span>綠色</span>
                    </div>
                    <div class="color-filter" data-color="yellow">
                        <div class="color-dot color-yellow"></div>
                        <span>黃色</span>
                    </div>
                    <div class="color-filter" data-color="purple">
                        <div class="color-dot color-purple"></div>
                        <span>紫色</span>
                    </div>
                    <div class="color-filter" data-color="red">
                        <div class="color-dot color-red"></div>
                        <span>紅色</span>
                    </div>
                    <div class="color-filter" data-color="orange">
                        <div class="color-dot color-orange"></div>
                        <span>橙色</span>
                    </div>
                    <div class="color-filter" data-color="pink">
                        <div class="color-dot color-pink"></div>
                        <span>粉色</span>
                    </div>
                    <div class="color-filter" data-color="teal">
                        <div class="color-dot color-teal"></div>
                        <span>青色</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>導入/導出</h3>
                <button class="btn btn--outline btn--full-width" id="importBtn">導入</button>
                <button class="btn btn--outline btn--full-width" id="exportBtn">導出</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>

            <div class="sidebar-section">
                <h3>鍵盤快捷鍵</h3>
                <div class="keyboard-shortcuts">
                    <div class="shortcut">
                        <kbd>←→</kbd>
                        <span>日期導航</span>
                    </div>
                    <div class="shortcut">
                        <kbd>↑↓</kbd>
                        <span>週導航</span>
                    </div>
                    <div class="shortcut">
                        <kbd>Enter</kbd>
                        <span>選擇日期</span>
                    </div>
                    <div class="shortcut">
                        <kbd>Tab</kbd>
                        <span>開始鍵盤導航</span>
                    </div>
                    <div class="shortcut">
                        <kbd>Esc</kbd>
                        <span>取消選擇</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="calendar-container">
                <!-- Month View -->
                <div class="calendar-view" id="monthView">
                    <div class="calendar-header">
                        <div class="weekday">日</div>
                        <div class="weekday">一</div>
                        <div class="weekday">二</div>
                        <div class="weekday">三</div>
                        <div class="weekday">四</div>
                        <div class="weekday">五</div>
                        <div class="weekday">六</div>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>

                <!-- Week View -->
                <div class="calendar-view hidden" id="weekView">
                    <div class="week-header">
                        <div class="time-column"></div>
                        <div class="week-days" id="weekDays"></div>
                    </div>
                    <div class="week-content">
                        <div class="time-slots" id="timeSlots"></div>
                        <div class="week-grid" id="weekGrid"></div>
                    </div>
                </div>

                <!-- Day View -->
                <div class="calendar-view hidden" id="dayView">
                    <div class="day-header">
                        <h3 id="dayTitle"></h3>
                    </div>
                    <div class="day-content">
                        <div class="time-slots" id="dayTimeSlots"></div>
                        <div class="day-events" id="dayEvents"></div>
                    </div>
                </div>

                <!-- Year View -->
                <div class="calendar-view hidden" id="yearView">
                    <div class="year-grid" id="yearGrid"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Event Modal -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新增事件</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="eventForm">
                    <div class="form-group">
                        <label class="form-label" for="eventTitle">標題</label>
                        <input type="text" class="form-control" id="eventTitle" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventDate">日期</label>
                        <input type="date" class="form-control" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventStartTime">開始時間</label>
                        <input type="time" class="form-control" id="eventStartTime">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventEndTime">結束時間</label>
                        <input type="time" class="form-control" id="eventEndTime">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventDescription">描述</label>
                        <textarea class="form-control" id="eventDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventType">類型</label>
                        <select class="form-control" id="eventType">
                            <option value="工作">工作</option>
                            <option value="個人">個人</option>
                            <option value="假期">假期</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventColor">顏色</label>
                        <div class="color-picker" id="colorPicker">
                            <div class="color-option" data-color="blue"></div>
                            <div class="color-option" data-color="green"></div>
                            <div class="color-option" data-color="yellow"></div>
                            <div class="color-option" data-color="purple"></div>
                            <div class="color-option" data-color="red"></div>
                            <div class="color-option" data-color="orange"></div>
                            <div class="color-option" data-color="pink"></div>
                            <div class="color-option" data-color="teal"></div>
                        </div>
                        <input type="hidden" id="eventColor" value="blue">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventRepeat">重複</label>
                        <select class="form-control" id="eventRepeat">
                            <option value="不重複">不重複</option>
                            <option value="每日">每日</option>
                            <option value="每週">每週</option>
                            <option value="每月">每月</option>
                            <option value="每年">每年</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn--secondary" id="cancelEvent">取消</button>
                <button type="button" class="btn btn--primary" id="saveEvent">儲存</button>
                <button type="button" class="btn btn--outline" id="deleteEvent" style="display: none;">刪除</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
